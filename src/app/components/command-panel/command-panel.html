<aside class="command-panel">
  <div class="panel-header">
    <span class="panel-title">Commands</span>
  </div>
  <div class="command-list">
    @for (cmd of commands; track cmd.name; let i = $index) {
      <button
        class="command-item"
        [class.active]="i === activeIndex"
        [class.explored]="progress.isExplored(categoryIndex, i)"
        (click)="select(i)">
        <div class="cmd-top">
          <span class="cmd-name">git {{ cmd.name }}</span>
          @if (progress.isExplored(categoryIndex, i)) {
            <span class="cmd-check">&#10003;</span>
          }
        </div>
        <div class="cmd-brief">{{ cmd.description }}</div>
      </button>
    }
  </div>
</aside>
